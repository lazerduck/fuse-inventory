<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <!-- Orange burst gradient -->
    <radialGradient id="burst" cx="200" cy="150" r="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFF9C4"/>
      <stop offset="10%" stop-color="#FFD54F"/>
      <stop offset="30%" stop-color="#FF9800"/>
      <stop offset="60%" stop-color="#F57C00"/>
      <stop offset="100%" stop-color="#E65100" stop-opacity="0"/>
    </radialGradient>
    <!-- Blue to orange gradient for horizontal traces -->
    <linearGradient id="hLeft" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#42A5F5"/>
      <stop offset="70%" stop-color="#FFB74D"/>
      <stop offset="100%" stop-color="#FF9800" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="hRight" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0%" stop-color="#42A5F5"/>
      <stop offset="70%" stop-color="#FFB74D"/>
      <stop offset="100%" stop-color="#FF9800" stop-opacity="0"/>
    </linearGradient>
    <!-- Diagonal gradients -->
    <linearGradient id="dTL" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#42A5F5"/>
      <stop offset="70%" stop-color="#FFB74D"/>
      <stop offset="100%" stop-color="#FF9800" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="dTR" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#42A5F5"/>
      <stop offset="70%" stop-color="#FFB74D"/>
      <stop offset="100%" stop-color="#FF9800" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="dBL" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#42A5F5"/>
      <stop offset="70%" stop-color="#FFB74D"/>
      <stop offset="100%" stop-color="#FF9800" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="dBR" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#42A5F5"/>
      <stop offset="70%" stop-color="#FFB74D"/>
      <stop offset="100%" stop-color="#FF9800" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background burst glow -->
  <ellipse cx="200" cy="150" rx="45" ry="80" fill="url(#burst)" opacity="0.5"/>

  <!-- Orange spikes (8-pointed starburst) -->
  <g fill="#FF9800" opacity="0.85" filter="url(#glow)">
    <ellipse cx="200" cy="70" rx="3" ry="50"/>
    <ellipse cx="200" cy="70" rx="3" ry="50" transform="rotate(45, 200, 150)"/>
    <ellipse cx="200" cy="70" rx="3" ry="50" transform="rotate(90, 200, 150)"/>
    <ellipse cx="200" cy="70" rx="3" ry="50" transform="rotate(135, 200, 150)"/>
    <ellipse cx="200" cy="70" rx="3" ry="50" transform="rotate(180, 200, 150)"/>
    <ellipse cx="200" cy="70" rx="3" ry="50" transform="rotate(225, 200, 150)"/>
    <ellipse cx="200" cy="70" rx="3" ry="50" transform="rotate(270, 200, 150)"/>
    <ellipse cx="200" cy="70" rx="3" ry="50" transform="rotate(315, 200, 150)"/>
  </g>

  <!-- Inner burst - lighter -->
  <g fill="#FFD54F" opacity="0.6">
    <ellipse cx="200" cy="120" rx="2" ry="28"/>
    <ellipse cx="200" cy="120" rx="2" ry="28" transform="rotate(90, 200, 150)"/>
  </g>

  <!-- Horizontal blue traces -->
  <!-- Left horizontal -->
  <path d="M 130 150 Q 100 150, 90 150 L 55 150"
        fill="none" stroke="url(#hLeft)" stroke-width="4" stroke-linecap="round"/>
  <circle cx="50" cy="150" r="8" fill="#42A5F5"/>
  <circle cx="50" cy="150" r="3.5" fill="white" opacity="0.35"/>

  <!-- Right horizontal -->
  <path d="M 270 150 Q 300 150, 310 150 L 345 150"
        fill="none" stroke="url(#hRight)" stroke-width="4" stroke-linecap="round"/>
  <circle cx="350" cy="150" r="8" fill="#42A5F5"/>
  <circle cx="350" cy="150" r="3.5" fill="white" opacity="0.35"/>

  <!-- Diagonal top-left -->
  <path d="M 165 125 Q 140 110, 130 100 L 85 65"
        fill="none" stroke="url(#dTL)" stroke-width="4" stroke-linecap="round"/>
  <circle cx="78" cy="58" r="8" fill="#42A5F5"/>
  <circle cx="78" cy="58" r="3.5" fill="white" opacity="0.35"/>

  <!-- Diagonal top-right -->
  <path d="M 235 125 Q 260 110, 270 100 L 315 65"
        fill="none" stroke="url(#dTR)" stroke-width="4" stroke-linecap="round"/>
  <circle cx="322" cy="58" r="8" fill="#42A5F5"/>
  <circle cx="322" cy="58" r="3.5" fill="white" opacity="0.35"/>

  <!-- Diagonal bottom-left -->
  <path d="M 165 175 Q 140 190, 130 200 L 85 235"
        fill="none" stroke="url(#dBL)" stroke-width="4" stroke-linecap="round"/>
  <circle cx="78" cy="242" r="8" fill="#42A5F5"/>
  <circle cx="78" cy="242" r="3.5" fill="white" opacity="0.35"/>

  <!-- Diagonal bottom-right -->
  <path d="M 235 175 Q 260 190, 270 200 L 315 235"
        fill="none" stroke="url(#dBR)" stroke-width="4" stroke-linecap="round"/>
  <circle cx="322" cy="242" r="8" fill="#42A5F5"/>
  <circle cx="322" cy="242" r="3.5" fill="white" opacity="0.35"/>

  <!-- Vertical top -->
  <path d="M 193 130 L 193 105 L 180 85"
        fill="none" stroke="#42A5F5" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="174" cy="78" r="7" fill="#42A5F5"/>
  <circle cx="174" cy="78" r="3" fill="white" opacity="0.35"/>

  <!-- Vertical bottom -->
  <path d="M 207 170 L 207 195 L 220 215"
        fill="none" stroke="#42A5F5" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="226" cy="222" r="7" fill="#42A5F5"/>
  <circle cx="226" cy="222" r="3" fill="white" opacity="0.35"/>

  <!-- Inner diagonals -->
  <!-- Inner top-left -->
  <path d="M 175 140 Q 165 130, 155 120 L 135 100"
        fill="none" stroke="#42A5F5" stroke-width="3" stroke-linecap="round"/>
  <circle cx="129" cy="94" r="6" fill="#42A5F5"/>
  <circle cx="129" cy="94" r="2.5" fill="white" opacity="0.35"/>

  <!-- Inner top-right -->
  <path d="M 225 140 Q 235 130, 245 120 L 265 100"
        fill="none" stroke="#42A5F5" stroke-width="3" stroke-linecap="round"/>
  <circle cx="271" cy="94" r="6" fill="#42A5F5"/>
  <circle cx="271" cy="94" r="2.5" fill="white" opacity="0.35"/>

  <!-- Inner bottom-left -->
  <path d="M 175 160 Q 165 170, 155 180 L 135 200"
        fill="none" stroke="#42A5F5" stroke-width="3" stroke-linecap="round"/>
  <circle cx="129" cy="206" r="6" fill="#42A5F5"/>
  <circle cx="129" cy="206" r="2.5" fill="white" opacity="0.35"/>

  <!-- Inner bottom-right -->
  <path d="M 225 160 Q 235 170, 245 180 L 265 200"
        fill="none" stroke="#42A5F5" stroke-width="3" stroke-linecap="round"/>
  <circle cx="271" cy="206" r="6" fill="#42A5F5"/>
  <circle cx="271" cy="206" r="2.5" fill="white" opacity="0.35"/>

  <!-- Center star -->
  <g fill="#FFF9C4">
    <polygon points="200,132 204,150 200,168 196,150"/>
    <polygon points="200,132 204,150 200,168 196,150" transform="rotate(90, 200, 150)"/>
  </g>
  <circle cx="200" cy="150" r="5" fill="white"/>
</svg>