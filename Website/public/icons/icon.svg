<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD54F"/>
      <stop offset="60%" stop-color="#FF8F00"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <linearGradient id="arm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFB300"/>
      <stop offset="100%" stop-color="#1DA1DA"/>
    </linearGradient>
  </defs>

  <!-- Center glow -->
  <circle cx="64" cy="64" r="22" fill="url(#glow)" opacity="0.6"/>

  <!-- Orange burst spikes (12 spikes, every 30°) -->
  <g fill="#FF8F00" opacity="0.85">
    <polygon points="64,30 69,55 64,64 59,55" transform="rotate(0 64 64)"/>
    <polygon points="64,30 69,55 64,64 59,55" transform="rotate(30 64 64)"/>
    <polygon points="64,30 69,55 64,64 59,55" transform="rotate(60 64 64)"/>
    <polygon points="64,30 69,55 64,64 59,55" transform="rotate(90 64 64)"/>
    <polygon points="64,30 69,55 64,64 59,55" transform="rotate(120 64 64)"/>
    <polygon points="64,30 69,55 64,64 59,55" transform="rotate(150 64 64)"/>
    <polygon points="64,30 69,55 64,64 59,55" transform="rotate(180 64 64)"/>
    <polygon points="64,30 69,55 64,64 59,55" transform="rotate(210 64 64)"/>
    <polygon points="64,30 69,55 64,64 59,55" transform="rotate(240 64 64)"/>
    <polygon points="64,30 69,55 64,64 59,55" transform="rotate(270 64 64)"/>
    <polygon points="64,30 69,55 64,64 59,55" transform="rotate(300 64 64)"/>
    <polygon points="64,30 69,55 64,64 59,55" transform="rotate(330 64 64)"/>
  </g>

  <!-- Blue circuit-board arms with end circles -->
  <g stroke="#26A6DA" stroke-width="4" fill="none" stroke-linecap="round">
    <path d="M64,64 L64,18"/>
    <path d="M64,64 L64,110"/>
    <path d="M64,64 L18,64"/>
    <path d="M64,64 L110,64"/>
    <path d="M64,64 L28,28"/>
    <path d="M64,64 L100,100"/>
    <path d="M64,64 L100,28"/>
    <path d="M64,64 L28,100"/>
  </g>

  <!-- End circles on circuit arms -->
  <g fill="#26A6DA">
    <circle cx="64" cy="18" r="7"/>
    <circle cx="64" cy="110" r="7"/>
    <circle cx="18" cy="64" r="7"/>
    <circle cx="110" cy="64" r="7"/>
    <circle cx="28" cy="28" r="7"/>
    <circle cx="100" cy="100" r="7"/>
    <circle cx="100" cy="28" r="7"/>
    <circle cx="28" cy="100" r="7"/>
  </g>

  <!-- Inner circuit traces connecting center to burst -->
  <g stroke="#FFB300" stroke-width="3" fill="none" stroke-linecap="round">
    <circle cx="64" cy="64" r="8"/>
  </g>

  <!-- Bright center star -->
  <g fill="#FFF8E1">
    <polygon points="64,50 66,64 64,78 62,64"/>
    <polygon points="64,50 66,64 64,78 62,64" transform="rotate(90 64 64)"/>
  </g>
  <circle cx="64" cy="64" r="3" fill="#FFF8E1"/>
</svg>