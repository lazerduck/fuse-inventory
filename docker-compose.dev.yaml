services:
  fuse-api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    volumes:
      - ./test-data:/app/data
    container_name: fuse-api-dev
    develop:
      watch:
      - action: rebuild
        path: ./API

  fuse-ui:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - ./UI/Fuse.Web:/app
      - fuse-ui-node-modules:/app/node_modules
    environment:
      - VITE_API_BASE_URL=http://localhost:8080
    container_name: fuse-ui-dev
    develop:
      watch:
      - action: sync
        path: ./UI/Fuse.Web/src
        target: /app/frontend/src

volumes:
  fuse-ui-node-modules: